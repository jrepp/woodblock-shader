<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Woodblock Shader Demo</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script type="importmap">
      {
        "imports": {
          "three": "./vendor/three/build/three.module.js"
        }
      }
    </script>
    <style>
      html, body { margin: 0; height: 100%; background: #111; overflow: hidden; }
      #hud {
        position: absolute; left: 12px; top: 12px; width: min(620px, calc(100vw - 24px));
        color: #ddd; font: 12px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: rgba(0,0,0,0.25); padding: 10px 12px; border-radius: 10px;
        backdrop-filter: blur(4px);
      }
      #hud b { color: #fff; }
      #hud .row { display: flex; gap: 12px; align-items: center; flex-wrap: wrap; }
      #hud input[type="file"] { color: #ddd; }
      #hud select, #hud input[type="range"] { background: #141414; color: #ddd; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 4px 6px; }
      #hud .file { opacity: 0.9; font-size: 11px; }
      #palettes { display: flex; flex-direction: column; gap: 6px; }
      .palette-block { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; }
      .palette-label { min-width: 140px; opacity: 0.9; }
      .layout { display: grid; grid-template-columns: 220px 1fr; gap: 12px; margin-top: 8px; align-items: start; }
      .controls { display: flex; flex-direction: column; gap: 8px; }
      .control { display: flex; flex-direction: column; gap: 4px; }
      .control label { font-size: 11px; opacity: 0.9; }
      .control span { font-size: 11px; opacity: 0.85; }
      details { margin-top: 8px; }
      details > summary { cursor: pointer; user-select: none; }
      .minimized #hud-body { display: none; }
      .hud-toggle { margin-left: auto; background: rgba(0,0,0,0.35); color: #ddd; border: 1px solid rgba(255,255,255,0.15); border-radius: 6px; padding: 4px 8px; cursor: pointer; }
      .swatch { width: 16px; height: 16px; border-radius: 4px; border: 1px solid rgba(255,255,255,0.25); }
      .note { opacity: 0.9; }
      a { color: #b7d5ff; text-decoration: none; }
      a:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div id="hud">
      <div class="row">
        <div><b>Woodblock / illuminated print shader</b></div>
        <div class="note">
          Load: (1) line art (B/W), (2) color reference.
          Mouse drag orbit. Scroll zoom.
          Default assets auto-load from <code>assets/</code> (uploads override).
        </div>
        <button id="hudToggle" class="hud-toggle">Hide UI</button>
      </div>
      <div id="hud-body" class="layout">
        <div class="controls">
        <div class="control">
          <label for="inkAlpha">Ink alpha: <span id="inkAlphaVal">0.95</span></label>
          <input id="inkAlpha" type="range" min="0.7" max="1.0" step="0.01" value="0.95" />
        </div>
        <div class="control">
          <label for="inkEdge">Ink edge: <span id="inkEdgeVal">0.60</span></label>
          <input id="inkEdge" type="range" min="0.4" max="0.85" step="0.01" value="0.60" />
        </div>
        <div class="control">
          <label for="pigmentAlpha">Pigment alpha: <span id="pigmentAlphaVal">0.55</span></label>
          <input id="pigmentAlpha" type="range" min="0.2" max="0.8" step="0.01" value="0.55" />
        </div>
          <div class="control">
            <label for="grainScale">Grain scale: <span id="grainScaleVal">1.40</span></label>
          <input id="grainScale" type="range" min="0.8" max="4.0" step="0.05" value="1.40" />
          </div>
          <div class="control">
            <label for="grainNormal">Grain normal: <span id="grainNormalVal">0.08</span></label>
            <input id="grainNormal" type="range" min="0.0" max="0.2" step="0.01" value="0.08" />
          </div>
          <div class="control">
            <label for="pigmentNoiseScale">Pigment noise: <span id="pigmentNoiseScaleVal">1.60</span></label>
            <input id="pigmentNoiseScale" type="range" min="0.6" max="3.0" step="0.05" value="1.6" />
          </div>
        <div class="control">
          <label for="registration">Registration: <span id="registrationVal">0.0012</span></label>
          <input id="registration" type="range" min="0.0" max="0.004" step="0.0002" value="0.0012" />
        </div>
        <div class="control">
          <label for="heightThreshold">Line threshold: <span id="heightThresholdVal">0.45</span></label>
          <input id="heightThreshold" type="range" min="0.20" max="0.65" step="0.01" value="0.45" />
        </div>
        <div class="control">
          <label for="heightBlur">Line blur: <span id="heightBlurVal">1</span></label>
          <input id="heightBlur" type="range" min="0" max="4" step="1" value="1" />
        </div>
        <div class="control">
          <label for="heightProfile">Line profile: <span id="heightProfileVal">1.60</span></label>
          <input id="heightProfile" type="range" min="1.0" max="2.2" step="0.05" value="1.6" />
        </div>
          <div class="control">
            <label for="vignette">Vignette: <span id="vignetteVal">0.35</span></label>
            <input id="vignette" type="range" min="0.0" max="0.6" step="0.02" value="0.35" />
          </div>
          <div class="control">
            <label for="specular">Specular: <span id="specularVal">0.00</span></label>
            <input id="specular" type="range" min="0.0" max="0.06" step="0.002" value="0.00" />
          </div>
        </div>
        <div>
          <div class="row">
            <label>Line art: <input id="lineInput" type="file" accept="image/*" /></label>
            <div class="file" id="lineFile"></div>
            <label>Color reference: <input id="colorInput" type="file" accept="image/*" /></label>
            <div class="file" id="colorFile"></div>
            <label>Preview:
              <select id="debugSelect">
                <option value="0">Final</option>
                <option value="1">Height</option>
                <option value="2">Normal</option>
                <option value="3">Pigment mask</option>
                <option value="4">Wood grain</option>
                <option value="5">Pigment noise</option>
                <option value="6">Pigment fill</option>
                <option value="7">Pigment low</option>
                <option value="8">Pigment edge</option>
              </select>
            </label>
            <button id="rebuild">Rebuild maps</button>
          </div>
          <details open>
            <summary>Palette</summary>
            <div id="palettes"></div>
          </details>
        </div>
      </div>
    </div>

    <script type="module" src="./main.js"></script>

  </body>
</html>
